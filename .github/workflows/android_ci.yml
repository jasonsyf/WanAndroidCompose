# GitHub Actions 持续集成与交付 (CI/CD) 配置文件
# GitHub Actions Continuous Integration and Delivery (CI/CD) Configuration
# 该文件定义了项目在 GitHub 上的全自动化流程：代码扫描、编译测试、体积监控与版本发布
name: Android CI/CD

# 触发规则 (Trigger Rules)：定义流水线在何种情况下被激活
on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'
    # 路径过滤：以下文件的变动不会触发流水线 (Save CI resources)
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'scripts/**'

  pull_request:
    branches: [ "master" ]
    # 路径过滤：以下文件的变动不会触发流水线
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'scripts/**'

jobs:
  # --------------------------------------------------------------------------------
  # 任务一：静态分析 (Lint) | Job 1: Static Analysis (Lint)
  # 目的：在合并代码前发现潜在的 Android 规范错误、性能问题或安全隐患
  # 策略：仅在 PR 阶段并行运行，提高反馈速度且不阻塞普通的 Push 流程
  # --------------------------------------------------------------------------------
  lint:
    name: Static Analysis (Lint)
    # 仅在触发事件为合并请求时执行 (Run only on Pull Requests)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      # 1.1: 拉取代码 (Checkout Source Code)
      - name: 1.1 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以供差异分析

      # 1.2: 获取变动文件
      - name: 1.2 Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            app/src/main/**
            app/src/release/**
            gradle/libs.versions.toml
            **/*.gradle.kts

      # 1.3: 配置 Java 运行环境 (Setup Java Environment)
      - name: 1.3 Set up JDK 17
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 1.4: 运行 Android Lint 检查 (Run Android Lint)
      - name: 1.4 Run Lint Debug
        if: steps.changed-files.outputs.any_changed == 'true'
        run: ./gradlew lintDebug

  # --------------------------------------------------------------------------------
  # 任务二：编译与测试 (Build & Test) | Job 2: Compilation & Testing
  # 目的：确保代码逻辑正确，并生成可供下载和签署的 APK 安装包
  # 策略：所有 Push 和 PR 都会触发，是项目稳定性的核心防线
  # --------------------------------------------------------------------------------
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      # 2.1: 拉取代码 (Checkout Source Code)
      - name: 2.1 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2.2: 获取变动文件
      - name: 2.2 Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.kt
            **/*.kts
            gradle/libs.versions.toml

      # 2.3: 配置 Java 运行环境 (Setup Java Environment)
      - name: 2.3 Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 2.4: 赋予 Gradle 脚本执行权限 (Grant Executable Permissions)
      - name: 2.4 Grant execute permission for gradlew
        run: chmod +x gradlew

      # 2.5: 关键参数校验 (Verify Essential Secrets)
      - name: 2.5 Verify Secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_FILE }}" ]; then echo "ERROR: KEYSTORE_FILE is missing"; exit 1; fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then echo "ERROR: KEYSTORE_PASSWORD is missing"; exit 1; fi

      # 2.6: 运行单元测试 (Execute Unit Tests)
      # 仅当逻辑代码或版本配置变动时运行
      - name: 2.6 Run Unit Tests
        if: steps.changed-files.outputs.any_changed == 'true'
        run: ./gradlew testDebugUnitTest

      # 2.7: 编译 Debug 版 APK (Assemble Debug APK)
      - name: 2.7 Build Debug APK
        run: ./gradlew assembleDebug

      # 2.8: 解密并还原签名密钥 (Restore Signing Keystore)
      - name: 2.8 Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > "${{ github.workspace }}/release.keystore"

      # 2.9: 编译并签署 Release 版 APK (Assemble & Sign Release APK)
      - name: 2.9 Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 2.10: 归档 Debug 产物 (Archive Debug Artifacts)
      - name: 2.10 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      # 2.11: 归档 Release 产物 (Archive Release Artifacts)
      - name: 2.11 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

  # --------------------------------------------------------------------------------
  # 任务三：包体积监控 (Size Report) | Job 3: App Size Monitoring
  # 目的：对比当前代码与主分支包体积，防止因引入大库或未压缩图片导致的体积膨胀
  # 策略：仅在 PR 阶段运行，对比分析结果将自动以评论形式反馈在 PR 页面
  # --------------------------------------------------------------------------------
  size-report:
    name: App Size Report
    if: github.event_name == 'pull_request'
    needs: build # 必须依赖 build 任务生成的 APK 产物
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # 显式授权，允许 Job 在合并请求中发表评论
    steps:
      # 3.1: 下载当前分支的 APK (Download Current Branch APK)
      - name: 3.1 Download Current APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: current-apk

      # 3.2: 获取主分支的基准包 (获取 Master 分支最近一次成功的 Release 包)
      - name: 3.2 Download Base APK from Master
        run: |
          # 优先尝试下载固定名称的产物，如果失败则回溯搜索
          if ! gh run download --branch master --name app-release --dir base-apk 2>/dev/null; then
            echo "⚠️ 未发现名为 'app-release' 的标准产物，正在回溯搜索 master 最近的成功记录..."
            # 寻找 master 最近一个成功的、包含产物的 Run ID
            RUN_ID=$(gh run list --branch master --workflow "Android CI/CD" --status success --event push --limit 1 --json databaseId --jq '.[0].databaseId')
            if [ -n "$RUN_ID" ]; then
              echo "✅ 找到基准运行 ID: $RUN_ID，正在尝试下载..."
              gh run download $RUN_ID --dir base-apk || echo "❌ 仍未能找到可对比的产物"
            else
              echo "❌ 未能在 master 分支找到任何成功的历史记录"
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3.3: 安装差异分析工具 (Install Diffuse Tool)
      # Diffuse 是 Android 领域最专业的 APK 差异分析工具，可深入对比 Dex、资源和体积
      - name: 3.3 Install Diffuse
        run: |
          curl -L https://github.com/JakeWharton/diffuse/releases/latest/download/diffuse-all.jar -o diffuse.jar

      # 3.4: 执行体积对比 (Execute Size Comparison)
      # 对比基准包与当前包，并提取关键的增量数据 (Dex, Arsc, Total Size)
      - name: 3.4 Compare APK Sizes
        id: compare
        run: |
          CURRENT_APK=$(ls current-apk/*.apk | head -n 1)
          BASE_APK=$(ls base-apk/*.apk | head -n 1 || echo "")
          if [ -f "$BASE_APK" ]; then
            java -jar diffuse.jar diff "$BASE_APK" "$CURRENT_APK" --text report.txt
            echo "SIZE_REPORT<<EOF" >> $GITHUB_OUTPUT
            cat report.txt | head -n 25 >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "SIZE_REPORT=⚠️ 未能找到主分支基准包，跳过对比。提示：请确保 master 分支已成功运行过流水线并生成了 app-release 产物。" >> $GITHUB_OUTPUT
          fi

      # 3.5: 发布结果评论 (Post Report to PR Comment)
      # 将分析结果直接展示在 PR 讨论区，让代码审查者一眼看到体积变化
      - name: 3.5 Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const report = process.env.REPORT;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "### 📦 包体积变化报告 (App Size Report)\n\n```\n" + report + "\n```"
            })
        env:
          REPORT: ${{ steps.compare.outputs.SIZE_REPORT }}

  # --------------------------------------------------------------------------------
  # 任务四：发布部署 (Deploy) | Job 4: Release Deployment
  # 目的：将正式签名的 APK 自动发布到仓库的 Release 页面
  # 策略：仅在推送版本标签时运行，实现自动生成发版说明和文件挂载
  # --------------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # 授权写权限，以便创建 GitHub Release
    steps:
      # 4.1: 拉取代码 (Checkout Source Code)
      - name: 4.1 Checkout Code
        uses: actions/checkout@v4

      # 4.2: 下载正式签名的 APK (Download Signed APK)
      - name: 4.2 Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: release-artifacts

      # 4.3: 创建 GitHub Release (Create GitHub Release)
      # 自动根据 Commit 历史生成 ChangeLog，并将 APK 挂载为发布附件
      - name: 4.3 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
