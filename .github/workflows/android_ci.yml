# GitHub Actions 持续集成与交付 (CI/CD) 配置文件
name: Android CI/CD

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master" ]

jobs:
  # 任务一：静态分析 (Lint)
  lint:
    name: Static Analysis (Lint)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Run Lint Debug
        run: ./gradlew lintDebug

  # 任务二：编译与测试 (Build & Test)
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_FILE }}" ]; then echo "ERROR: KEYSTORE_FILE is missing"; exit 1; fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then echo "ERROR: KEYSTORE_PASSWORD is missing"; exit 1; fi
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > "${{ github.workspace }}/release.keystore"
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

  # ----------------------------------------------------------------
  # 任务三：包体积监控 (Size Report) - 新增
  # 目的：对比当前分支与主分支的 APK 大小，防止包体积意外增长
  # 策略：仅在 PR 阶段运行，对比结果将作为评论发在 PR 下方
  # ----------------------------------------------------------------
  size-report:
    name: App Size Report
    if: github.event_name == 'pull_request'
    needs: build # 必须等待编译完成后执行
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # 授权写 PR 评论的权限
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 步骤 3.1: 下载当前分支的 APK (从刚才的 build 任务下载)
      - name: Download Current APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: current-apk

      # 步骤 3.2: 下载主分支 (master) 的最新成功产物作为基准
      # 使用 GitHub CLI 进行跨工作流下载
      - name: Download Base APK from Master
        run: |
          gh run download --branch master --name app-release --dir base-apk || echo "No base APK found on master"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 步骤 3.3: 安装 Diffuse 工具 (由 Jake Wharton 开发的 Android 差异分析神器)
      - name: Install Diffuse
        run: |
          curl -L https://github.com/JakeWharton/diffuse/releases/latest/download/diffuse-all.jar -o diffuse.jar

      # 步骤 3.4: 执行对比并生成报告
      - name: Compare APK Sizes
        id: compare
        run: |
          CURRENT_APK=$(ls current-apk/*.apk | head -n 1)
          BASE_APK=$(ls base-apk/*.apk | head -n 1 || echo "")
          
          if [ -f "$BASE_APK" ]; then
            # 使用 diffuse 对比两个 APK，并提取 Markdown 格式的摘要
            java -jar diffuse.jar diff "$BASE_APK" "$CURRENT_APK" --text report.txt
            # 简单提取报告摘要
            echo "SIZE_REPORT<<EOF" >> $GITHUB_OUTPUT
            cat report.txt | head -n 20 >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "SIZE_REPORT=⚠️ 未能找到主分支基准包，跳过对比。" >> $GITHUB_OUTPUT
          fi

      # 步骤 3.5: 将结果作为评论发布在 PR 下方
      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const report = process.env.REPORT;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "### 📦 包体积变化报告 (App Size Report)\n\n```\n" + report + "\n```"
            })
        env:
          REPORT: ${{ steps.compare.outputs.SIZE_REPORT }}

  # 任务四：发布部署 (Deploy)
  deploy:
    name: Deploy
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: release-artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
