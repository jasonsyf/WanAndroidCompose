name: Android CI/CD

# 触发机制：定义流水线何时运行
on:
  push:
    # 当代码推送到 master 分支时运行
    branches: [ "master" ]
    # 当推送版本标签（如 v1.0.1）时运行，触发发布流程
    tags:
      - 'v*'
  pull_request:
    # 当发起合并请求到 master 分支时运行，用于代码预检
    branches: [ "master" ]

jobs:
  # 任务一：编译与测试 (Build & Test)
  build:
    name: Build & Test
    # 使用 GitHub 托管的 Ubuntu 虚拟机环境
    runs-on: ubuntu-latest
    steps:
      # 步骤 1: 拉取代码 (使用 v4 官方插件)
      # fetch-depth: 0 表示拉取完整 Git 历史，避免引用丢失错误 (Exit code 128)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 步骤 2: 配置 JDK 环境 (Java 17 是当前主流 Android 项目推荐版本)
      # cache: gradle 开启缓存，大幅提升后续运行速度
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 步骤 3: 赋予 Gradle 脚本执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 步骤 4: 安全校验：检查 GitHub Secrets 是否配置正确
      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_FILE }}" ]; then echo "ERROR: KEYSTORE_FILE is missing"; exit 1; fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then echo "ERROR: KEYSTORE_PASSWORD is missing"; exit 1; fi

      # 步骤 5: 运行静态分析 (Lint) 和单元测试 (Test)
      - name: Run Lint & Tests
        run: ./gradlew lint test

      # 步骤 6: 编译 Debug 版 APK (用于日常测试)
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 步骤 7: 解密签名文件 (安全最佳实践)
      # 将 Base64 格式的密钥还原为二进制 .keystore 文件
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > "${{ github.workspace }}/release.keystore"

      # 步骤 8: 编译并签名 Release 版 APK
      # env 将 Secrets 注入环境变量，传递给 Gradle 使用
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          # 使用绝对路径定位解密后的密钥文件
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 步骤 9: 上传 Debug APK 归档 (Artifacts)
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      # 步骤 10: 上传 Release APK 归档 (供后续 Deploy 任务使用)
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

  # 任务二：发布部署 (Deploy)
  # needs: build 确保只有编译成功后才会执行部署
  # if: 只有推送 Tag 时才触发正式发布
  deploy:
    name: Deploy
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # 显式授权写入权限，以便创建 GitHub Release
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 步骤 11: 下载刚才生成的 Release 产物
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: release-artifacts

      # 步骤 12: 在 GitHub 仓库创建 Release 页面
      # 自动挂载 APK 文件，并根据 Commit 历史生成发布日志 (Release Notes)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
